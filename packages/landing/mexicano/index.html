    <h2>What is Mexicano Padel?</h2>
    <p>A competitive tournament format where matchups change based on standings after each round. Unlike <a href="/americano">Americano</a> where pairings are random, Mexicano uses your current score to find the most balanced opponents.</p>

    <h2>How Dynamic Matchups Work</h2>
    <ol>
      <li>Round 1 starts with random pairings (like Americano)</li>
      <li>After each round, players are ranked by total points</li>
      <li>Top-ranked players face each other; lower-ranked face each other</li>
      <li>Partners also change each round</li>
      <li>This creates increasingly tight, competitive matches</li>
    </ol>

    <h2>Frequently Asked Questions</h2>
    <h3>How does Mexicano differ from Americano?</h3>
    <p>In <a href="/americano">Americano</a>, pairings are random. In Mexicano, the app uses standings to create balanced matchups. Mexicano rewards consistency; Americano rewards adaptability.</p>
    <h3>When should I use Mexicano?</h3>
    <p>When your group wants competitive, balanced games — especially with players of similar skill levels.</p>
    <h3>How many players do you need?</h3>
    <p>Minimum 4. For the best experience, 8–16 players with 2–4 courts.</p>
