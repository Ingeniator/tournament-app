    <h2>What is Americano Padel?</h2>
    <p>A social tournament format where partners change every round. You play with a different partner each match, and your individual score accumulates across all rounds. It's the perfect format for groups of mixed skill levels.</p>

    <h2>How to Play</h2>
    <ol>
      <li>Gather 4–16 players and book 1 court per 4 players</li>
      <li>Each round, partners are randomly assigned</li>
      <li>Play each match to a fixed point total (e.g. 32 points)</li>
      <li>Points are added to each player's individual total</li>
      <li>After all rounds, the player with the most points wins</li>
    </ol>

    <h2>Frequently Asked Questions</h2>
    <h3>How many players do you need?</h3>
    <p>Minimum 4 players (one court). Ideally 8–16 players for a fun tournament.</p>
    <h3>How does scoring work?</h3>
    <p>Each match is played to a fixed number of points. Points are split between teams. Each player adds their team's points to their individual total.</p>
    <h3>What's the difference between Americano and Mexicano?</h3>
    <p>In Americano, partners and opponents are random. In <a href="/mexicano">Mexicano</a>, matchups are based on standings — top players face each other.</p>
    <h3>How long does a tournament take?</h3>
    <p>With 8 players on 2 courts: 2–3 hours. With 16 players on 4 courts: 3–4 hours.</p>
